# Redirect-only deploy. This branch exists solely to 301 the old Netlify
# domain (aniketlodh.netlify.app) to the live site on Vercel. Do not merge
# into v2 — it intentionally contains no application code so Netlify performs
# no framework build.

[build]
publish = "dist"
command = "true"

[[redirects]]
from = "/*"
to = "https://portfolio.alodh.in/:splat"
status = 301
force = true
