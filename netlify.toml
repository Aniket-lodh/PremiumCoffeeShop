# Redirect-only deploy. This branch exists solely to 301 the old Netlify
# domain (premium-coffee-by-aniket-lodh.netlify.app) to the live site at
# brew.alodh.in. Do not merge into code — it intentionally contains no
# application code so Netlify performs no framework build.

[build]
publish = "dist"
command = "true"

[[redirects]]
from = "/*"
to = "https://brew.alodh.in/:splat"
status = 301
force = true
